<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register - Global eLibrary">
    <title>Register - Global eLibrary</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-book-open"></i> Global eLibrary
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="browse.html">Browse Books</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            <i class="fas fa-shopping-cart"></i> Cart
                            <span class="cart-badge" id="cartBadge">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-theme-toggle" id="themeToggle">
                            <i class="fas fa-moon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="row w-100">
            <!-- Illustration -->
            <div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center">
                <div class="text-center">
                    <i class="fas fa-user-circle fa-10x text-accent opacity-50 mb-4"></i>
                    <h3 class="fw-bold mb-3">Join Our Community</h3>
                    <p class="lead text-muted">Create an account and enjoy unlimited access</p>
                </div>
            </div>

            <!-- Register Form -->
            <div class="col-lg-6">
                <div class="card shadow-lg auth-card">
                    <div class="card-body p-5">
                        <h2 class="text-center fw-bold mb-1">Create Account</h2>
                        <p class="text-center text-muted mb-4">Join Global eLibrary today</p>

                        <form id="registerForm">
                            <!-- Full Name Input -->
                            <div class="mb-3">
                                <label for="fullName" class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control form-control-lg" id="fullName" 
                                       placeholder="Enter your full name" required>
                            </div>

                            <!-- Email Input -->
                            <div class="mb-3">
                                <label for="registerEmail" class="form-label fw-bold">Email Address</label>
                                <input type="email" class="form-control form-control-lg" id="registerEmail" 
                                       placeholder="Enter your email" required>
                            </div>

                            <!-- Password Input -->
                            <div class="mb-3">
                                <label for="registerPassword" class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control form-control-lg" id="registerPassword" 
                                       placeholder="Create a password (min 6 characters)" required minlength="6">
                                <small class="text-muted">Password must be at least 6 characters</small>
                            </div>

                            <!-- Confirm Password Input -->
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label fw-bold">Confirm Password</label>
                                <input type="password" class="form-control form-control-lg" id="confirmPassword" 
                                       placeholder="Confirm your password" required>
                            </div>

                            <!-- Terms and Conditions -->
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                                <label class="form-check-label" for="agreeTerms">
                                    I agree to the <a href="#" class="text-accent text-decoration-none">Terms & Conditions</a>
                                </label>
                            </div>

                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
                                <i class="fas fa-user-plus"></i> Create Account
                            </button>
                        </form>

                        <!-- Divider -->
                        <div class="text-center my-4">
                            <span class="text-muted">or</span>
                        </div>

                        <!-- Social Registration -->
                        <button type="button" class="btn btn-outline-secondary btn-lg w-100 mb-2">
                            <i class="fab fa-google"></i> Sign up with Google
                        </button>

                        <!-- Login Link -->
                        <p class="text-center mt-4">
                            Already have an account? 
                            <a href="login.html" class="text-accent fw-bold text-decoration-none">Login here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
